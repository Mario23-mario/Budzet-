<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budżet MSC v3</title>
<style>
body{background:#0f172a;color:white;font-family:Arial,sans-serif;max-width:1000px;margin:auto;padding:20px}
.card{background:#1e293b;padding:16px;border-radius:12px;margin-bottom:15px}
.row{display:flex;justify-content:space-between;gap:10px;margin:8px 0}
input{width:140px;padding:10px;border:none;border-radius:8px;background:#334155;color:white}
button{padding:12px 16px;border:none;border-radius:8px;cursor:pointer}
.total{font-weight:bold;color:#4ade80}
</style>
</head>
<body>
<h1>💶 Budżet MSC v3</h1>

<div class="card">
<h2>Przychody</h2>
<div class="row"><span>Wypłata</span><input id="wyplata" type="number"></div>
<div class="row"><span>Kindergeld</span><input id="kindergeld" type="number"></div>
<div class="row total"><span>Razem</span><span id="income">0 €</span></div>
</div>

<div class="card">
<h2>Stałe wydatki</h2>
<div class="row"><span>Czynsz</span><input id="czynsz" type="number"></div>
<div class="row"><span>Prąd</span><input id="prad" type="number"></div>
<div class="row"><span>Telefony</span><input id="telefony" type="number"></div>
<div class="row"><span>Internet</span><input id="internet" type="number"></div>
<div class="row"><span>Ubezpieczenie auta</span><input id="ubezpieczenie" type="number"></div>
</div>

<div class="card">
<h2>Inne wydatki</h2>
<div class="row"><span>Rata</span><input id="rata" type="number"></div>
<div class="row"><span>Klarna</span><input id="klarna" type="number"></div>
<div class="row"><span>Potrzeby</span><input id="potrzeby" type="number"></div>
<div class="row"><span>Pozostałe</span><input id="inne" type="number"></div>
</div>

<div class="card">
<h2>Oszczędności</h2>
<div class="row"><span>BTC / ETF</span><input id="btc" type="number"></div>
<div class="row"><span>Fundusz awaryjny</span><input id="fundusz" type="number"></div>
</div>

<div class="card">
<h2>Podsumowanie</h2>
<p>Przychody: <span id="s1">0 €</span></p>
<p>Wydatki: <span id="s2">0 €</span></p>
<p>Oszczędności: <span id="s3">0 €</span></p>
<p>Wolne środki: <span id="s4">0 €</span></p>
</div>

<div class="card">
<button onclick="saveMonth()">💾 Zapisz miesiąc</button>
<input type="file" accept=".json" onchange="loadMonth(event)">
<p id="status"></p>
</div>

<script>
const fields=[...document.querySelectorAll('input[type=number]')];

function v(id){return Number(document.getElementById(id).value)||0;}

function calc(){
const income=v('wyplata')+v('kindergeld');
const expenses=v('czynsz')+v('prad')+v('telefony')+v('internet')+v('ubezpieczenie')+v('rata')+v('klarna')+v('potrzeby')+v('inne');
const savings=v('btc')+v('fundusz');
const free=income-expenses-savings;

incomeEl=document.getElementById('income');
incomeEl.textContent=income.toFixed(2)+' €';
document.getElementById('s1').textContent=income.toFixed(2)+' €';
document.getElementById('s2').textContent=expenses.toFixed(2)+' €';
document.getElementById('s3').textContent=savings.toFixed(2)+' €';
document.getElementById('s4').textContent=free.toFixed(2)+' €';

localStorage.setItem('budzetMSCv3',JSON.stringify(Object.fromEntries(fields.map(f=>[f.id,f.value]))));
}

fields.forEach(f=>f.addEventListener('input',calc));

const saved=JSON.parse(localStorage.getItem('budzetMSCv3')||'{}');
fields.forEach(f=>{if(saved[f.id]!==undefined)f.value=saved[f.id]});
calc();

function saveMonth(){
const data=Object.fromEntries(fields.map(f=>[f.id,f.value]));
const d=new Date();
const fileName=`Budzet_MSC_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}.json`;
const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
const a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download=fileName;
a.click();
}

function loadMonth(event){
const file=event.target.files[0];
if(!file) return;

const reader=new FileReader();
reader.onload=function(e){
try{
const data=JSON.parse(e.target.result);
fields.forEach(f=>{
 if(data[f.id]!==undefined){f.value=data[f.id];}
});
calc();
document.getElementById('status').textContent='✅ Wczytano: '+file.name;
}catch(err){
document.getElementById('status').textContent='❌ Błąd pliku JSON';
}
};
reader.readAsText(file);
}
</script>
</body>
</html>
